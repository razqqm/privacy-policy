<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px 60px;
        }

        header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }

        .policies {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .policy-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 20px 24px;
            transition: border-color 0.2s, background 0.2s;
        }

        .policy-card:hover {
            background: #181818;
            border-color: #333;
        }

        .policy-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .policy-name {
            font-size: 1.05rem;
            font-weight: 500;
            color: #fff;
        }

        .policy-arrow {
            color: #444;
            font-size: 1.1rem;
            transition: transform 0.2s, color 0.2s;
        }

        .policy-card:hover .policy-arrow {
            transform: translateX(3px);
            color: #888;
        }

        .policy-description {
            font-size: 0.85rem;
            color: #777;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .policy-meta {
            font-size: 0.75rem;
            color: #555;
        }

        footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid #1a1a1a;
            text-align: center;
            font-size: 0.75rem;
            color: #444;
        }

        @media (max-width: 600px) {
            .container {
                padding: 48px 16px 40px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .policy-card {
                padding: 16px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Privacy Policies</h1>
            <p class="subtitle">Privacy policies for apps by Ilia Arestov (<a href="https://ilia.ae" style="color:#666;text-decoration:underline;text-underline-offset:2px">ilia.ae</a>)</p>
        </header>

        <div class="policies">
            <a href="vault-approver/index.html" class="policy-card">
                <div class="policy-header">
                    <span class="policy-name">Vault Approver</span>
                    <span class="policy-arrow">&rarr;</span>
                </div>
                <p class="policy-description">Companion app for self-hosted Vaultwarden/Bitwarden servers. Approve or deny passwordless login requests via push notifications.</p>
                <div class="policy-meta">Updated: March 2, 2026</div>
            </a>
        </div>

        <footer>&copy; 2026 Ilia Arestov</footer>
    </div>
</body>
</html>
